<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Kebaikan Mas Trio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaQa0SG2TDHJa3qRNtxRoedmbl5k7GQZ4",
            authDomain: "tracker-kebaikan-trio.firebaseapp.com",
            projectId: "tracker-kebaikan-trio",
            storageBucket: "tracker-kebaikan-trio.firebasestorage.app",
            messagingSenderId: "103207582485",
            appId: "1:103207582485:web:0cd2543beafade254fc71c",
            measurementId: "G-YDGCETEYQB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Referensi database
        const kebaikanRef = ref(db, 'kebaikan');
        const totalRef = ref(db, 'total');

        // Update UI secara Real-time saat data di database berubah
        onValue(kebaikanRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById("history-list");
            list.innerHTML = "";
            if (data) {
                Object.entries(data).reverse().forEach(([key, val]) => {
                    let li = document.createElement("li");
                    li.className = "history-item";
                    li.innerHTML = `
                        <div class="history-info">
                            <span class="history-amount">+ Rp ${parseInt(val.nominal).toLocaleString('id-ID')}</span>
                            <div class="history-note">"${val.harapan}"</div>
                            <span class="history-time">${val.waktu}</span>
                        </div>
                        <div class="history-right">
                            <button class="btn-hapus-item" onclick="hapusEntri('${key}', ${val.nominal})">🗑️</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            } else {
                list.innerHTML = '<div class="empty-state">Belum ada riwayat kebaikan.</div>';
            }
        });

        onValue(totalRef, (snapshot) => {
            const total = snapshot.val() || 0;
            document.getElementById("total-uang").innerText = "Rp " + total.toLocaleString('id-ID');
        });

        window.tambahKebaikan = () => {
            const nominal = parseInt(document.getElementById("input-nominal").value);
            const harapan = document.getElementById("input-harapan").value;
            if (isNaN(nominal) || nominal <= 0) return;

            push(kebaikanRef, {
                nominal: nominal,
                harapan: harapan,
                waktu: new Date().toLocaleString('id-ID')
            });

            onValue(totalRef, (snapshot) => {
                const currentTotal = snapshot.val() || 0;
                set(totalRef, currentTotal + nominal);
            }, {onlyOnce: true});

            document.getElementById("input-nominal").value = "";
            document.getElementById("input-harapan").value = "";
            // Animasi tetap ada
            tampilkanAnimasiKabulkan();
        };

        window.hapusEntri = (key, nominal) => {
            if(confirm("Hapus entri ini?")) {
                remove(ref(db, 'kebaikan/' + key));
                onValue(totalRef, (snapshot) => {
                    set(totalRef, (snapshot.val() || 0) - nominal);
                }, {onlyOnce: true});
            }
        };

        window.resetData = () => {
            if(confirm("Hapus SEMUA riwayat?")) {
                set(kebaikanRef, null);
                set(totalRef, 0);
            }
        };
    </script>
    <!-- Tambahkan CSS kamu di sini seperti kode sebelumnya -->
</head>
<body>
    <!-- (Gunakan struktur HTML yang sama seperti sebelumnya) -->
    <!-- Pastikan id-id elemen tetap sama agar script di atas bisa bekerja -->
</body>
</html>
